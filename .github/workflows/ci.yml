name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run rustfmt + offline tests
        run: make check-rust

  audit-rust:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: make audit-rust

  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate Rust coverage reports
        run: make coverage-rust-ci
      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: target/coverage/rust
          if-no-files-found: error

  android-unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Generate Android JVM coverage reports
        run: make coverage-android-unit-ci
      - name: Upload Android JVM coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-coverage
          path: target/coverage/android-unit
          if-no-files-found: error

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs:
      - rust-coverage
      - android-unit-tests
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download Rust coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: artifacts/rust-coverage
      - name: Download Android coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: android-unit-coverage
          path: artifacts/android-unit-coverage
      - name: Build combined coverage summary
        run: |
          RUST_SUMMARY="$(find artifacts/rust-coverage -name summary.txt -print -quit)"
          ANDROID_SUMMARY="$(find artifacts/android-unit-coverage -name summary.txt -print -quit)"
          test -n "$RUST_SUMMARY"
          test -n "$ANDROID_SUMMARY"
          {
            echo "## Coverage Summary"
            echo
            echo "### Rust"
            echo
            echo '```text'
            cat "$RUST_SUMMARY"
            echo '```'
            echo
            echo "### Android JVM"
            echo
            echo '```text'
            cat "$ANDROID_SUMMARY"
            echo '```'
            echo
            echo "Artifacts:"
            echo "- \`rust-coverage\`"
            echo "- \`android-unit-coverage\`"
          } > coverage-summary.md
          cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Update pull request coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- codex-coverage-summary -->';
            const summary = fs.readFileSync('coverage-summary.md', 'utf8');
            const body = `${marker}\n${summary}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning(`Skipping coverage PR comment: ${error.message}`);
                return;
              }

              throw error;
            }

  verify-swap-bundle:
    name: Verify Swap Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify checked-in bundle
        run: make verify-swap-bundle

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;27.0.12077973
      - name: Build for Android
        run: make build-android

  verify-kotlin-bindings:
    name: Verify Kotlin Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;27.0.12077973
      - name: Verify checked-in Kotlin bindings
        run: make verify-kotlin-bindings
