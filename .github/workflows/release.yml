name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;27.0.12077973
      - name: Cross-compile native library
        env:
          OUBLI_MAINNET_RPC_URL: ${{ secrets.OUBLI_MAINNET_RPC_URL }}
          OUBLI_MAINNET_PAYMASTER_API_KEY: ${{ secrets.OUBLI_MAINNET_PAYMASTER_API_KEY }}
          OUBLI_FEE_COLLECTOR_PUBKEY: ${{ secrets.OUBLI_FEE_COLLECTOR_PUBKEY }}
          OUBLI_FEE_PERCENT: ${{ secrets.OUBLI_FEE_PERCENT }}
        run: make build-android
      - name: Decode keystore
        run: echo "${{ secrets.OUBLI_KEYSTORE_BASE64 }}" | base64 -d > android/oubli-release.jks
      - name: Build release APK
        run: cd android && OUBLI_KEYSTORE_PASSWORD="${{ secrets.OUBLI_KEYSTORE_PASSWORD }}" ./gradlew assembleRelease
      - name: Rename APK with version
        run: cp android/app/build/outputs/apk/release/app-release.apk oubli-${{ github.ref_name }}.apk
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: oubli-${{ github.ref_name }}.apk
          generate_release_notes: true
